# Bat CD — triggered by `v*.*.*` tag push from scripts/release.ts.
# Builds UI, applies D1 migrations, deploys Worker to Cloudflare, verifies /api/live.
# Probe binary build + R2 upload + VPS upgrade are still manual (P1/P2).
name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to deploy (e.g. v1.1.1)"
        required: true
        type: string

jobs:
  deploy-worker:
    name: Deploy Worker (production)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    concurrency:
      group: deploy-worker-production
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve version
        id: ver
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          TAG="${INPUT_TAG:-$GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG"          >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"  >> "$GITHUB_OUTPUT"
          PKG_VERSION=$(jq -r .version package.json)
          if [ "$PKG_VERSION" != "$VERSION" ]; then
            echo "❌ Tag $TAG does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared + UI (into packages/worker/static)
        run: bun run build

      # D1 migration MUST run before wrangler deploy.
      # CLAUDE.md retrospective: deploying Worker code that references new
      # columns before migrating drops all probe ingest fleet-wide.
      - name: Apply D1 migrations (production, remote)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/worker
          command: d1 migrations apply bat-db --remote --env production

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/worker
          command: deploy --env production

      - name: Verify /api/live reports new version
        run: |
          set -e
          EXPECTED="${{ steps.ver.outputs.version }}"
          for i in 1 2 3 4 5 6; do
            ACTUAL=$(curl -fsS https://bat-ingest.worker.hexly.ai/api/live | jq -r .version)
            echo "attempt $i: live=$ACTUAL expected=$EXPECTED"
            if [ "$ACTUAL" = "$EXPECTED" ]; then
              echo "✅ Live version matches"
              exit 0
            fi
            sleep 5
          done
          echo "❌ /api/live did not report $EXPECTED after 30s"
          exit 1

      - name: Summary
        if: always()
        run: |
          {
            echo "### Bat Release ${{ steps.ver.outputs.tag }}"
            echo ""
            echo "- Worker: deployed to \`bat\` (production)"
            echo "- D1: \`bat-db\` migrations applied"
            echo "- Verify: https://bat-ingest.worker.hexly.ai/api/live"
            echo ""
            echo "**Probe binaries are NOT auto-deployed** — run the manual steps in CLAUDE.md (R2 upload + VPS upgrade)."
          } >> "$GITHUB_STEP_SUMMARY"
