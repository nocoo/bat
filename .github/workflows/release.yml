# Bat CD
# - Tag push (v*.*.*) → deploy-tagged: strict version match (release.ts flow)
# - CI green on main   → deploy-main:    continuous deploy of latest main
# - workflow_dispatch  → deploy-tagged: manual redeploy of a specific tag
# Probe binaries auto-built and uploaded to R2 on tag push.
# VPS upgrade is still manual.
name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to deploy (e.g. v1.1.1)"
        required: true
        type: string

jobs:
  # ─────────────────────────────────────────────────────
  # Tagged release: enforces tag == package.json version
  # ─────────────────────────────────────────────────────
  deploy-tagged:
    name: Deploy Worker (tagged)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    concurrency:
      group: deploy-worker-production
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve version
        id: ver
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          TAG="${INPUT_TAG:-$GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG"          >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"  >> "$GITHUB_OUTPUT"
          PKG_VERSION=$(jq -r .version package.json)
          if [ "$PKG_VERSION" != "$VERSION" ]; then
            echo "❌ Tag $TAG does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared + UI (into packages/worker/static)
        run: bun run build

      # D1 migration MUST run before wrangler deploy.
      # CLAUDE.md retrospective: deploying Worker code that references new
      # columns before migrating drops all probe ingest fleet-wide.
      - name: Apply D1 migrations (production, remote)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/worker
          command: d1 migrations apply bat-db --remote --env production

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/worker
          command: deploy --env production

      - name: Verify /api/live reports new version
        run: |
          set -e
          EXPECTED="${{ steps.ver.outputs.version }}"
          for i in 1 2 3 4 5 6; do
            ACTUAL=$(curl -fsS https://bat-ingest.worker.hexly.ai/api/live | jq -r .version)
            echo "attempt $i: live=$ACTUAL expected=$EXPECTED"
            if [ "$ACTUAL" = "$EXPECTED" ]; then
              echo "✅ Live version matches"
              exit 0
            fi
            sleep 5
          done
          echo "❌ /api/live did not report $EXPECTED after 30s"
          exit 1

      - name: Summary
        if: always()
        run: |
          {
            echo "### Bat Release ${{ steps.ver.outputs.tag }}"
            echo ""
            echo "- Trigger: tagged (\`${{ github.event_name }}\`)"
            echo "- Worker: deployed to \`bat\` (production)"
            echo "- D1: \`bat-db\` migrations applied"
            echo "- Verify: https://bat-ingest.worker.hexly.ai/api/live"
            echo "- Probe: binaries uploaded to R2 (see probe-release job)"
            echo ""
            echo "**VPS upgrade is still manual** — run the upgrade command in CLAUDE.md."
          } >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────────────
  # Continuous deploy: main push, gated by CI success
  # ─────────────────────────────────────────────────────
  deploy-main:
    name: Deploy Worker (main)
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    concurrency:
      group: deploy-worker-production
      cancel-in-progress: false
    steps:
      - name: Checkout main HEAD that CI validated
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Read package.json version
        id: ver
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared + UI (into packages/worker/static)
        run: bun run build

      # D1 migration MUST run before wrangler deploy.
      - name: Apply D1 migrations (production, remote)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/worker
          command: d1 migrations apply bat-db --remote --env production

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/worker
          command: deploy --env production

      - name: Verify /api/live reports new version
        run: |
          set -e
          EXPECTED="${{ steps.ver.outputs.version }}"
          for i in 1 2 3 4 5 6; do
            HTTP=$(curl -fsS -o /tmp/live.json -w "%{http_code}" https://bat-ingest.worker.hexly.ai/api/live || echo "000")
            ACTUAL=$(jq -r .version /tmp/live.json 2>/dev/null || echo "?")
            echo "attempt $i: http=$HTTP version=$ACTUAL expected=$EXPECTED"
            if [ "$ACTUAL" = "$EXPECTED" ]; then
              echo "✅ Live version matches"
              exit 0
            fi
            sleep 5
          done
          echo "❌ /api/live did not report $EXPECTED after 30s"
          exit 1

      - name: Summary
        if: always()
        run: |
          {
            echo "### Bat Continuous Deploy"
            echo ""
            echo "- Trigger: main push (CI gated)"
            echo "- SHA: \`${{ steps.ver.outputs.sha }}\`"
            echo "- Version: \`${{ steps.ver.outputs.version }}\`"
            echo "- D1: \`bat-db\` migrations applied"
            echo "- Verify: https://bat-ingest.worker.hexly.ai/api/live"
          } >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────────────
  # Probe: build static musl binaries + upload to R2
  # Runs on tag push only (same trigger as deploy-tagged).
  # ─────────────────────────────────────────────────────
  probe-release:
    name: "Probe Release"
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Resolve version
        id: ver
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build x86_64 binary
        uses: docker/build-push-action@v6
        with:
          context: .
          file: probe/Dockerfile.build
          platforms: linux/amd64
          outputs: type=local,dest=probe/out

      - name: Build aarch64 binary
        uses: docker/build-push-action@v6
        with:
          context: .
          file: probe/Dockerfile.build
          platforms: linux/arm64
          outputs: type=local,dest=probe/out-arm64

      - name: Rename aarch64 binary
        run: |
          mv probe/out-arm64/bat-probe-linux-x86_64 probe/out/bat-probe-linux-aarch64
          rm -rf probe/out-arm64

      - name: Generate checksums
        run: |
          cd probe/out
          sha256sum bat-probe-linux-x86_64 > bat-probe-linux-x86_64.sha256
          sha256sum bat-probe-linux-aarch64 > bat-probe-linux-aarch64.sha256

      - name: Verify binaries
        run: |
          file probe/out/bat-probe-linux-x86_64
          file probe/out/bat-probe-linux-aarch64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: probe-binaries
          path: probe/out/
          retention-days: 7

      - name: Setup Wrangler for R2 upload
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload to R2 (versioned)
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          wrangler r2 object put "zhe/apps/bat/${VERSION}/bat-probe-linux-x86_64" --file probe/out/bat-probe-linux-x86_64 --remote
          wrangler r2 object put "zhe/apps/bat/${VERSION}/bat-probe-linux-aarch64" --file probe/out/bat-probe-linux-aarch64 --remote
          wrangler r2 object put "zhe/apps/bat/${VERSION}/bat-probe-linux-x86_64.sha256" --file probe/out/bat-probe-linux-x86_64.sha256 --remote
          wrangler r2 object put "zhe/apps/bat/${VERSION}/bat-probe-linux-aarch64.sha256" --file probe/out/bat-probe-linux-aarch64.sha256 --remote

      - name: Upload to R2 (latest)
        run: |
          wrangler r2 object put "zhe/apps/bat/latest/bat-probe-linux-x86_64" --file probe/out/bat-probe-linux-x86_64 --remote
          wrangler r2 object put "zhe/apps/bat/latest/bat-probe-linux-aarch64" --file probe/out/bat-probe-linux-aarch64 --remote
          wrangler r2 object put "zhe/apps/bat/latest/bat-probe-linux-x86_64.sha256" --file probe/out/bat-probe-linux-x86_64.sha256 --remote
          wrangler r2 object put "zhe/apps/bat/latest/bat-probe-linux-aarch64.sha256" --file probe/out/bat-probe-linux-aarch64.sha256 --remote

      - name: Summary
        if: always()
        run: |
          {
            echo "### Probe Release ${{ steps.ver.outputs.version }}"
            echo ""
            echo "- x86_64: \`bat-probe-linux-x86_64\` → R2"
            echo "- aarch64: \`bat-probe-linux-aarch64\` → R2"
            echo "- Checksums: SHA-256"
            echo "- Install: \`curl -fsSL https://s.zhe.to/apps/bat/latest/bat-probe-linux-x86_64\`"
          } >> "$GITHUB_STEP_SUMMARY"
